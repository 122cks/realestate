name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  schedule:
    # 매일 자정 KST (UTC 15:00) — 구글 시트 최신 데이터 자동 반영
    - cron: '0 15 * * *'
  workflow_dispatch:
    # GitHub Actions 탭에서 수동 배포 트리거 가능

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Fetch Google Sheet data (pre-bake)
        run: node scripts/fetch-sheet.cjs
        env:
          VITE_SPREADSHEET_ID: ${{ secrets.VITE_SPREADSHEET_ID }}
          VITE_SHEET_GID: ${{ secrets.VITE_SHEET_GID }}
        continue-on-error: true   # 시트 연결 실패해도 빌드 계속
      - name: Build
        run: npm run build
        env:
          VITE_KAKAO_JS_KEY: ${{ secrets.VITE_KAKAO_JS_KEY }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SPREADSHEET_ID: ${{ secrets.VITE_SPREADSHEET_ID }}
          VITE_SHEET_GID: ${{ secrets.VITE_SHEET_GID }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
